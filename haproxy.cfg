#───────────────────────────────────────────────────────────────────────────────
# haproxy.cfg — Base configuration
# Docs: https://docs.haproxy.org/
#
# DIRECTORY LAYOUT (load more files by adding them to the `global` cfg-dir,
# or by including them with `include` directives inside each section):
#
#   haproxy/
#   ├── haproxy.cfg          ← this file (global + defaults + stats frontend)
#   ├── frontends/
#   │   ├── http.cfg         ← port 80 frontend + ACL routing
#   │   └── https.cfg        ← port 443 frontend (add when TLS is ready)
#   └── backends/
#       ├── app1.cfg         ← backend for service "app1"
#       └── app2.cfg         ← backend for service "app2"
#
# To activate multi-file loading, change the `command` in docker-compose.yml to:
#   haproxy -f /usr/local/etc/haproxy/haproxy.cfg
#            -f /usr/local/etc/haproxy/frontends/
#            -f /usr/local/etc/haproxy/backends/
#───────────────────────────────────────────────────────────────────────────────

global
    log         stdout  format raw  local0  info
    maxconn     50000
    # Run as the built-in non-root user (default in haproxy:2.4+)
    user        haproxy
    group       haproxy
    # Uncomment to enable the Unix socket for runtime API (reload, drain, etc.)
    # stats socket /tmp/haproxy.sock mode 600 level admin expose-fd listeners

defaults
    log         global
    mode        http
    option      httplog
    option      dontlognull
    option      forwardfor          # Inject X-Forwarded-For header
    option      http-server-close   # Better keepalive handling
    timeout connect  5s
    timeout client   30s
    timeout server   30s
    retries          3
    # Return a clean 503 when no backend is available
    errorfile 503 /usr/local/etc/haproxy/errors/503.http

#───────────────────────────────────────────────────────────────────────────────
# Stats dashboard  →  http://localhost:8404/stats
#───────────────────────────────────────────────────────────────────────────────
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    # Protect the dashboard in production:
    # stats auth admin:changeme

#───────────────────────────────────────────────────────────────────────────────
# HTTP Frontend — routes incoming requests to backends via ACLs
#───────────────────────────────────────────────────────────────────────────────
frontend http_in
    bind *:80
    mode http

    # ── ACL definitions ────────────────────────────────────────────────────────
    # Route by Host header (virtual hosting / path-based, pick what fits)
    acl is_app1  hdr(host) -i app1.example.com
    acl is_app2  hdr(host) -i app2.example.com

    # ── Routing rules ──────────────────────────────────────────────────────────
    use_backend  be_app1  if is_app1
    use_backend  be_app2  if is_app2

    # Catch-all default
    default_backend  be_app1

#───────────────────────────────────────────────────────────────────────────────
# Backend: app1
#───────────────────────────────────────────────────────────────────────────────
backend be_app1
    mode        http
    balance     roundrobin          # Options: leastconn, random, source, uri
    option      httpchk GET /healthz HTTP/1.1\r\nHost:\ app1
    http-check  expect status 200

    server  app1  app1:80  check inter 5s fall 3 rise 2
    # Scale horizontally by adding more server lines:
    # server  app1-2  app1-replica:80  check inter 5s fall 3 rise 2

#───────────────────────────────────────────────────────────────────────────────
# Backend: app2
#───────────────────────────────────────────────────────────────────────────────
backend be_app2
    mode        http
    balance     leastconn           # Good for long-lived connections
    option      httpchk GET /healthz HTTP/1.1\r\nHost:\ app2
    http-check  expect status 200

    server  app2  app2:80  check inter 5s fall 3 rise 2
