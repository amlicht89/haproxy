#───────────────────────────────────────────────────────────────────────────────
# backends/app1.cfg
# Drop this file in haproxy/backends/ and load it with:
#   haproxy -f haproxy.cfg -f frontends/ -f backends/
#
# This pattern lets you manage each service's LB config independently.
#───────────────────────────────────────────────────────────────────────────────

backend be_app1
    mode        http
    balance     roundrobin
    option      httpchk GET /healthz HTTP/1.1\r\nHost:\ app1
    http-check  expect status 200

    # Add / remove replicas here without touching any other file
    server  app1-1  app1:80    check inter 5s fall 3 rise 2
    # server  app1-2  app1b:80   check inter 5s fall 3 rise 2
    # server  app1-3  app1c:80   check inter 5s fall 3 rise 2
